<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let luong = +prompt("Nhập lương");
    if (luong >= 15000000){
        luong = luong - luong*15/100;
    }else if (luong >=7000000){
        luong = luong - luong*10/100;
    }else {
        luong = luong - luong*5/100;
    }
    document.write(luong);
</script>
</body>
</html>
