<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let array = [];
    let count = 0;
    for (let i = 0; i < 10; i++) {
        array[i] = prompt("Nhập vào 1 phần tử " + i);
        if (!isNaN(array[i])) {
            count++;
        }
    }
    document.write("Số từ trong một chuỗi là : " + count);
</script>
</body>
</html>
